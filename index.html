<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" as="script" crossorigin>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Classroom Manager - TTC de la Salle Byumba</title>
    <!-- Google Fonts removed: using system fonts for instant load -->
    <!-- React 18 from cdnjs (fast CDN) with unpkg fallback -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" 
            crossorigin="anonymous"
            onerror="var s=document.createElement('script');s.src='https://unpkg.com/react@18.2.0/umd/react.production.min.js';document.head.appendChild(s)"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" 
            crossorigin="anonymous"
            onerror="var s=document.createElement('script');s.src='https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js';document.head.appendChild(s)"></script>
    <!-- Babel CDN removed: JSX pre-transpiled by esbuild -->

    <!-- Firebase SDK — Primary: gstatic (official Google CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js" defer></script>

    <!-- Firebase Fallback: jsdelivr CDN if gstatic is blocked -->
    <script>
        if (typeof firebase === 'undefined') {
            console.warn('gstatic blocked — trying jsdelivr CDN...');
            document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"><\/scr'+'ipt>');
            document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"><\/scr'+'ipt>');
        }
    </script>

    <style>
        :root {
            --primary: #a855f7;
            --primary-dark: #9333ea;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #1a0a2e;
            --bg-medium: #2d1b4e;
            --bg-light: #3d2466;
            --text-primary: #f1f5f9;
            --text-secondary: #c4b5d4;
            --border: #5b3f7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Landscape-only enforcement for Login Screen ── */
        #rotate-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 60%, #1a0a2e 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #f1f5f9;
        }
        #rotate-overlay .rotate-icon {
            font-size: 5rem;
            animation: rotatePhone 1.8s ease-in-out infinite;
            margin-bottom: 1.5rem;
            display: block;
        }
        #rotate-overlay h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }
        #rotate-overlay p {
            font-size: 0.95rem;
            color: #c4b5d4;
            max-width: 300px;
            line-height: 1.6;
        }
        #rotate-overlay .rotate-hint {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 1rem;
            padding: 0.75rem 1.5rem;
            font-size: 0.85rem;
            color: #c084fc;
        }
        @keyframes rotatePhone {
            0%   { transform: rotate(0deg);   }
            30%  { transform: rotate(90deg);  }
            70%  { transform: rotate(90deg);  }
            100% { transform: rotate(0deg);   }
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 280px;
            background: rgba(26, 10, 46, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            position: relative;
        }

        .logo-image {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo-image:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .logo-upload {
            display: none;
        }

        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .nav-item {
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            background: rgba(168, 85, 247, 0.15);
            border-left-color: var(--primary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(168, 85, 247, 0.25);
            border-left-color: var(--primary);
            color: var(--primary);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            background: rgba(45, 27, 78, 0.7);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .action-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .action-bar-left {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .action-bar-right {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(236, 72, 153, 0.1));
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(45, 27, 78, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .resource-grid {
            display: grid;
            gap: 1rem;
        }

        .resource-item {
            background: rgba(61, 36, 102, 0.4);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            gap: 1rem;
        }

        .resource-item:hover {
            background: rgba(61, 36, 102, 0.6);
            border-color: var(--primary);
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .resource-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .resource-actions {
            display: flex;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-available {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-in-use {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-maintenance {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .status-archived {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .schedule-day {
            background: rgba(61, 36, 102, 0.4);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .schedule-day:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--primary);
        }

        .day-header {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .day-events {
            margin-top: 0.5rem;
            font-size: 0.7rem;
        }

        .event-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            border-radius: 1rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 1.5rem;
            border-radius: 1rem 1rem 0 0;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(26, 10, 46, 0.7);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .form-input[type="date"] {
            color-scheme: dark;
        }

        .form-input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) saturate(5) hue-rotate(10deg);
            cursor: pointer;
        }

        input[type="date"] {
            color-scheme: dark;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6) sepia(1) saturate(5) hue-rotate(15deg);
            cursor: pointer;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .footer {
            background: rgba(26, 10, 46, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 3rem 2rem 2rem;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .footer-section p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .contact-item strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.25rem;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-in {
            animation: slideIn 0.5s ease-out forwards;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .table th {
            background: rgba(168, 85, 247, 0.15);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .table tr:hover {
            background: rgba(61, 36, 102, 0.4);
        }

        input[type="checkbox"] {
            accent-color: var(--primary);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(61, 36, 102, 0.3);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            background: rgba(61, 36, 102, 0.5);
        }

        .setting-info {
            flex: 1;
        }

        .setting-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .setting-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ════════════════════════════════════════
           LIGHT MODE — body.light-mode overrides
           ════════════════════════════════════════ */
        body.light-mode {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --secondary: #db2777;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --bg-dark: #f5f3ff;
            --bg-medium: #ede9fe;
            --bg-light: #ddd6fe;
            --text-primary: #1e1b4b;
            --text-secondary: #4c1d95;
            --border: #c4b5fd;
            --background: #f5f3ff;
            --card: #ede9fe;
            --text: #1e1b4b;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #f5f3ff 100%);
        }
        body.light-mode .sidebar {
            background: rgba(237, 233, 254, 0.97);
        }
        body.light-mode .header {
            background: rgba(237, 233, 254, 0.9);
        }
        body.light-mode .card {
            background: rgba(245, 243, 255, 0.95);
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.08);
        }
        body.light-mode .footer {
            background: rgba(237, 233, 254, 0.97);
        }
        body.light-mode .stat-card {
            background: linear-gradient(135deg, rgba(196,181,253,0.35), rgba(236,72,153,0.08));
        }
        body.light-mode .resource-item {
            background: rgba(237,233,254,0.8);
        }
        body.light-mode .resource-item:hover {
            background: rgba(221,214,254,0.9);
        }
        body.light-mode .schedule-day {
            background: rgba(237,233,254,0.7);
        }
        body.light-mode .setting-item {
            background: rgba(237,233,254,0.7);
        }
        body.light-mode .table th {
            background: rgba(196,181,253,0.25);
            color: #4c1d95;
        }
        body.light-mode .table tr:hover {
            background: rgba(221,214,254,0.5);
        }
        body.light-mode .nav-item:hover {
            background: rgba(124,58,237,0.1);
        }
        body.light-mode .nav-item.active {
            background: rgba(124,58,237,0.15);
        }
        body.light-mode .modal-content {
            background: #f5f3ff;
        }
        body.light-mode .form-input,
        body.light-mode .form-select,
        body.light-mode .form-textarea {
            background: #ffffff;
            color: #1e1b4b;
        }

        /* Smooth transition when switching themes */
        *, *::before, *::after {
            transition: background-color 0.3s ease, color 0.3s ease,
                        border-color 0.3s ease, box-shadow 0.3s ease !important;
        }

        /* ── THEME TOGGLE BUTTON ── */
        .theme-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: calc(100% - 4rem);
            margin: 0.5rem 2rem 0.25rem;
            padding: 0.7rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: rgba(168, 85, 247, 0.1);
            color: var(--text-primary);
            cursor: pointer;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
        }
        .theme-toggle-btn:hover {
            background: rgba(168, 85, 247, 0.22);
            transform: translateY(-1px);
        }
        body.light-mode .theme-toggle-btn {
            background: rgba(124, 58, 237, 0.08);
            color: #1e1b4b;
        }
        body.light-mode .theme-toggle-btn:hover {
            background: rgba(124, 58, 237, 0.16);
        }
        .theme-icon {

    <script>
        // Hide loading screen once React renders
        window.__hideLoader = function() {
            var ls = document.getElementById('loading-screen');
            if (ls) { ls.style.transition='opacity 0.4s'; ls.style.opacity='0'; setTimeout(function(){ls.remove();},400); }
        };
        window.addEventListener('error', function(e) {
            var msg = document.getElementById('error-msg');
            if (msg) {
                msg.style.display = 'block';
                msg.innerHTML = '⚠️ <strong>Script Error:</strong><br>' + (e.message||'Unknown error') +
                    '<br><br>Try refreshing the page. If the problem persists, check your internet connection (required for CDN libraries).';
            }
            var lm = document.getElementById('loading-msg');
            if (lm) lm.textContent = 'Error loading — see details below';
        });
        // Force-hide loader after 20s so user can see any errors
        setTimeout(function() {
            var ls = document.getElementById('loading-screen');
            if (ls && ls.style.opacity !== '0') {
                var lm = document.getElementById('loading-msg');
                if (lm) lm.textContent = 'Still loading...';
                var msg = document.getElementById('error-msg');
                if (msg) {
                    msg.style.display = 'block';
                    msg.innerHTML = '⏱️ <strong>Taking too long?</strong><br>Make sure you have an internet connection — React, Babel, and Firebase load from CDN.<br><br>Once loaded, the app will work offline.';
                }
            }
        }, 15000);
        // Force-hide loader after 25s regardless to show any rendered content
        setTimeout(function() {
            if (window.__hideLoader) window.__hideLoader();
        }, 25000);
    </script>

        // ============================================================
        // SAFE FIREBASE INITIALIZATION WITH RETRY
        // Waits up to 8 seconds for SDK to load (handles slow CDN)
        // ============================================================
        let db = null;
        let _firebaseReady = false;

        // No-op stubs — used when Firebase is unavailable
        function fbSet(path, data) {
            if (window.db) return window.db.ref(path).set(data);
            return Promise.resolve();
        }
        function fbGet(path) {
            if (window.db) return window.db.ref(path).get().then(snap => snap.exists() ? snap.val() : null);

        }
        function fbListen(path, callback) {
            if (window.db) window.db.ref(path).on('value', snap => callback(snap.exists() ? snap.val() : null));
        }
        function fbUnlisten(path) {
            if (window.db) window.db.ref(path).off();
        }

        function initFirebase() {
            try {

                window._firebaseReady = false;

        // Try immediately (SDK loaded synchronously above)
        if (!initFirebase()) {

    <!-- Rotate-to-Landscape overlay (login screen only) -->
    <div id="rotate-overlay">
        <span class="rotate-icon">📱</span>
        <h2>Rotate Your Device</h2>
        <p>The login screen requires <strong>landscape orientation</strong>. Please turn your device sideways to continue.</p>
        <div class="rotate-hint">
            ↔️ &nbsp;Rotate to landscape mode
        </div>
    </div>

    <script>
        (function () {
            var overlay = document.getElementById('rotate-overlay');

            function isLoginVisible() {
                return document.body.getAttribute('data-login-active') === 'true';
            }

            function isPortrait() {
                if (screen.orientation && screen.orientation.type) {
                    return screen.orientation.type.startsWith('portrait');
                }
                return window.innerHeight > window.innerWidth;
            }

            function checkOrientation() {
                if (isLoginVisible() && isPortrait()) {
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }

            setInterval(checkOrientation, 300);
            window.addEventListener('orientationchange', function () {
                setTimeout(checkOrientation, 200);
            });
            window.addEventListener('resize', checkOrientation);
        })();
    </script>
